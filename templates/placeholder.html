{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
    <div class="flex justify-center text-center py-20">
        <div class="w-full max-w-lg bg-msell-card p-10 rounded-3xl shadow-xl border border-msell-border">
            <h1 class="text-4xl font-extrabold text-msell-primary mb-4">{{ page_title }}</h1>
            <p class="text-gray-600 mb-6">{{ message }}</p>
            <a href="{{ url_for('dashboard') }}" class="inline-block px-6 py-2 text-white bg-msell-primary rounded-xl hover:bg-blue-600 transition duration-200">
                Go Back to Dashboard
            </a>
        </div>
    </div>
{% endblock %}
